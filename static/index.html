<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>InsightMap</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            background-color: #1e1e1e;
            margin: 0;
        }
        #graph {
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #panel {
            position: fixed;
            right: -100%;
            top: 0;
            width: 30%;
            min-width: 280px;
            max-width: 450px;
            height: 100vh;
            background: #2a2a2a;
            color: #ffffff;
            padding: 30px;
            transition: right 0.3s ease;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 10;
        }
        #panel.open {
            right: 0;
        }
        #panel h2 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #7eb8f7;
        }
        #panel p {
            font-size: 20px;
            line-height: 1.6;
            color: #cccccc;
        }
        #toolbar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        #date-select {
            background: #2a2a2a;
            color: #ffffff;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 18px;
            z-index: 999;
        }
        #panel-close {
            float: right;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="loading">뉴스 분석 중...</div>
    <div id="toolbar">
        <select id="date-select">
            <option value="">오늘 뉴스</option>
        </select>
    </div>
    <div id="graph"></div>
    <div id="panel">
        <button id="panel-close">✕</button>
        <h2 id="panel-title"></h2>
        <p id="panel-summary"></p>
    </div>
    <script>
    let network;
    const container = document.getElementById("graph");
    const options = {
        nodes: {
            shape: "dot",
            size: 10,
            font: { size: 12, color: "#ffffff" },
            color: { background: "#4a9eff", border: "#2d7dd2" }
        },
        edges: { color: "#444444", width: 1 },
        physics: {
            barnesHut: {
                gravitationalConstant: -8000,
                centralGravity: 5.0,
                springLength: 50,
                springConstant: 0.1
            },
            stabilization: {
                enabled: true,
                iterations: 200,
                fit: true
            }
        }
    };

    function updateGraph(data) {
        const nodes = new vis.DataSet(
            data.nodes.map((item) => ({
                id: item.id,
                label: item.label,
                size: 5 + (item.article_count * 3)
            }))
        );
        const edges = new vis.DataSet(
            data.edges.map((edge) => ({
                from: edge.from,
                to: edge.to,
                width: 1 + edge.weight * 0.5
            }))
        );
        network = new vis.Network(container, { nodes, edges }, options);

        network.once("stabilized", function() {
            network.setOptions({ physics: { enabled: false } });
        });

        network.on("click", function(params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const item = data.nodes.find(n => n.id === nodeId);
                const articles = item.articles;
                document.getElementById("panel-title").innerText = item.label;
                document.getElementById("panel-summary").innerHTML =
                    articles.map(a => 
                        `<b>${a.title}</b><br>
                        <small>${a.date}</small><br><br>
                        ${a.summary}<br><br>
                        <a href="${a.url}" target="_blank" style="color:#4a9eff">원문 보기</a>`
                    ).join(`<hr style="border: none; border-top: 1px solid #444; margin: 20px 0;">`);
                document.getElementById("panel").classList.add("open");
            }
        });
    }

    fetch("/api/dates")
        .then(response => response.json())
        .then(dates => {
            const select = document.getElementById("date-select");
            dates.forEach(date => {
                const option = document.createElement("option");
                option.value = date;
                option.text = date;
                select.appendChild(option);
            });
        });

    fetch("/api/nodes")
    .then(response => response.json())
    .then(data => {
        document.getElementById("loading").style.display = "none";
        updateGraph(data);
    });

    document.getElementById("date-select").addEventListener("change", function() {
        const date = this.value;
        if (date === "") {
            fetch("/api/nodes")
                .then(response => response.json())
                .then(data => updateGraph(data));
        } else {
            fetch("/api/snapshot?date=" + date)
                .then(response => response.json())
                .then(data => updateGraph(data));
        }
    });
    document.getElementById("panel-close").addEventListener("click", function() {
    document.getElementById("panel").classList.remove("open");
    });
</script>
</body>
</html>
